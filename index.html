<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Študenti</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .student {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .student img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .student h3 {
            margin: 10px 0 5px;
        }

        .student p {
            margin: 0;
            color: gray;
        }
    </style>
</head>
<body>

    <h1>Zoznam študentov</h1>

    <div class="container" id="students"></div>

    <script>
        fetch("/api")
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById("students");

                data.students.forEach(s => {
                    const div = document.createElement("div");
                    div.className = "student";

                    div.innerHTML = `
                        <img src="${s.image}" alt="">
                        <h3>${s.name} ${s.surename}</h3>
                        <p>${s.nickname}</p>
                    `;

                    container.appendChild(div);
                });
            });
    </script>

</body>
</html>
